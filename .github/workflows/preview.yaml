name: Deploy Branch Preview

on:
  push:
    branches:
      - test

permissions:
  contents: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Creates a file to disable Jekyll so your subfolder loads correctly
      - name: Disable Jekyll
        run: touch .nojekyll

      - name: Deploy Preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '.' 
          destination_dir: test    # Keeps it at /test
          keep_files: true         # Prevents overwriting your main site
