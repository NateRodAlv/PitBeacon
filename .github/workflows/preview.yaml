name: Deploy Branch Preview

on:
  pull_request:
    types: [opened, reopened, synchronize] # Runs when you open/update a PR from test to main

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Deploys your preview to a subfolder like: your-username.github.io/your-repo/pr-preview/pr-1/
      - name: Deploy PR Preview to GitHub Pages
        uses: rossjrw/pr-preview-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          source-dir: '.' 
