name: Deploy to Subfolders
on:
  push:
    branches:
      - main
      - test
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Deploy Main Branch to Root
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
      - name: Deploy Second Branch to Subfolder
        if: github.ref == 'refs/heads/test'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          target-folder: test
          clean: false
