name: Deploy Branch Preview

on:
  push:
    branches:
      - test        # Triggers instantly when you push to the test branch

permissions:
  contents: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '.'         # Deploys your root files
          destination_dir: test    # Puts the preview at: username.github.io/repo/test/
