name: Deploy to Subfolders

on:
  push:
    branches:
      - main
      - test # Change to your second branch name

permissions:
  contents: write # Required to commit build files to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # (Optional) Add compilation/build steps here if your framework requires them.
      # Example: npm ci && npm run build

      - name: Deploy Main Branch to Root
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Change to 'dist' or 'build' if using a framework
          branch: gh-pages

      - name: Deploy Second Branch to Subfolder
        if: github.ref == 'refs/heads/branch_two' # Change to your second branch name
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Change to 'dist' or 'build' if using a framework
          branch: gh-pages
          target-folder: test # The URL will be username.github.io/repo/subfolder_name
