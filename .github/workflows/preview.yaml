name: Deploy Branch Preview

on:
  push:
    branches:
      - test

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Creates the subfolder structure right inside the runner before uploading
      - name: Structure Preview Folder
        run: |
          mkdir -p _site/test
          cp -r * _site/test/ || true
          rm -rf _site/test/_site  # Prevent infinite nesting
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
