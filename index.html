<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="PitBeacon - FRC team pits tool. Real-time match alerts, team rankings, and event data for FIRST Robotics Competition teams.">
        <meta name="keywords" content="FRC, FIRST Robotics, team 7250, event management, match alerts, robotics competition, pitradar, pitbeacon">
        <meta name="author" content="FRC Team 7250">
        <meta name="theme-color" content="#1a1a1a">
        <meta name="robots" content="index, follow">
        <meta name="language" content="English">
        <title>PitBeacon - FRC Team Scouting & Event Management</title>
        
        <!-- Open Graph Tags for Social Media -->
        <meta property="og:title" content="PitBeacon - FRC Team Scouting & Event Management">
        <meta property="og:description" content="Real-time match alerts, team rankings, and comprehensive event data for FIRST Robotics Competition teams.">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://www.naterodalv.github.io/PitBeacon">
        
        <!-- Twitter Card Tags -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="PitBeacon - FRC Team Scouting & Event Management">
        <meta name="twitter:description" content="Real-time match alerts, team rankings, and comprehensive event data for FIRST Robotics teams.">
        
        <!-- Canonical URL -->
        <link rel="canonical" href="https://www.naterodalv.github.io/PitBeacon">
        
        <!-- Stylesheets and Resources -->
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="icon" href="favicon.png" type="image/x-icon">
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="header">
            <div class="logo">
                <h1 class="title">Pit
                    <span class="beacon">Beacon</span>
                </h1>
                <p class="frc7250">By FRC 7250</p>
                <p class="version">Version 1.5.1</p>
            </div>
            <div class="time-display" id="time-display">--:--:--</div>
            <div class="buttons">
                <img
                    class="settings"
                    src="settings.webp"
                    alt="Settings"
                    id="settings"
                ></img>
            </div>
        </div>
        <div class="settingscontainer" id="settingscontainer">
            <h2 class="settings-title">Settings</h2>
            <div class="settingsdiv">
                <div class="settings-section-title">General</div>
                <div class="settings-field">
                    <label for="teamNumber">Team Number</label>
                    <input
                        class="teaminput"
                        type="text"
                        id="teamNumber"
                        name="teamNumber"
                        value="7250"
                    ></input>
                </div>
                <div class="settings-field">
                    <label for="tbaapikey">TBA API Key</label>
                    <input
                        type="text"
                        id="tbaapikey"
                        name="tbaapikey"
                        value="TBA Key"
                    ></input>
                </div>
            </div>
            <div class="settingsdiv">
                <div class="settings-section-title">Alerts</div>
                <div class="settings-field">
                    <label for="noteAlarmToggle">Priority Notes Alarm</label>
                    <input type="checkbox" id="noteAlarmToggle" name="noteAlarmToggle"></input>
                </div>
                <div class="settings-field">
                    <label for="noteAlarmThreshold">Note Alarm Threshold</label>
                    <input
                        type="number"
                        id="noteAlarmThreshold"
                        name="noteAlarmThreshold"
                        min="1"
                        max="10"
                        value="8"
                    ></input>
                </div>
                <div class="settings-field">
                    <label for="noteAlarmSound">Note Sound</label>
                    <select id="noteAlarmSound" name="noteAlarmSound">
                        <option value="alarm1">Alarm 1</option>
                        <option value="alarm2">Alarm 2</option>
                        <option value="alarm3">Alarm 3</option>
                        <option value="beep">Beep</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="matchAlarmToggle">Match Alert</label>
                    <input type="checkbox" id="matchAlarmToggle" name="matchAlarmToggle" checked></input>
                </div>
                <div class="settings-field">
                    <label for="matchAlertThreshold">Match Alert (seconds before)</label>
                    <input
                        type="number"
                        id="matchAlertThreshold"
                        name="matchAlertThreshold"
                        min="30"
                        max="600"
                        value="300"
                    ></input>
                </div>
                <div class="settings-field">
                    <label for="matchAlarmSound">Match Sound</label>
                    <select id="matchAlarmSound" name="matchAlarmSound">
                        <option value="alarm1">Alarm 1</option>
                        <option value="alarm2">Alarm 2</option>
                        <option value="alarm3">Alarm 3</option>
                        <option value="beep">Beep</option>
                    </select>
                </div>
            </div>
            <div class="settingsdiv">
                <div class="settings-section-title">Testing</div>
                <div class="settings-field">
                    <label for="testMode">Test Mode</label>
                    <input type="checkbox" id="testMode" name="testMode"></input>
                </div>
                <div class="settings-field">
                    <label for="testDate">Test Date (YYYY-MM-DD)</label>
                    <input
                        type="text"
                        id="testDate"
                        name="testDate"
                        placeholder="2026-04-26"
                        style="display: none;"
                    ></input>
                </div>
            </div>
            <button class="savebutton" id="savebutton">Save</button>
            <button class="savebutton" id="layoutEditorBtn" style="background-color: rgb(100, 100, 150);">Layout Editor</button>
        </div>
        <div class="layout-editor-modal" id="layoutEditorModal">
        </div>
        <div class="errorcontainer" id="errorcontainer"></div>
        <div class="container" id="container"></div>
        <script type="module" src="app.js"></script>
    </body>
</html>
